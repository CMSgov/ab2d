name: tofu-apply
run-name: tofu-apply ${{ inputs.environment }}

on:
  workflow_call:
    inputs:
      environment:
        description: AB2D environment
        required: true
        type: string
      api_image_tag:
        description: ECR image tag for api service
        default: ""
        type: string
      contracts_image_tag:
        description: ECR image tag for contracts service
        default: ""
        type: string
      events_image_tag:
        description: ECR image tag for events service
        default: ""
        type: string
      idr_db_importer_image_tag:
        description: ECR image tag for idr-db-importer service
        default: ""
        type: string
      worker_image_tag:
        description: ECR image tag for worker service
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: AB2D environment
        required: true
        type: choice
        options:
          - dev
          - test
          - sandbox
          - prod
      api_image_tag:
        description: ECR image tag for api service
        default: ""
        type: string
      contracts_image_tag:
        description: ECR image tag for contracts service
        default: ""
        type: string
      events_image_tag:
        description: ECR image tag for events service
        default: ""
        type: string
      idr_db_importer_image_tag:
        description: ECR image tag for idr-db-importer service
        default: ""
        type: string
      worker_image_tag:
        description: ECR image tag for worker service
        default: ""
        type: string

concurrency:
  group: tofu-plan-or-apply

env:
  TENV_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  apply:
    permissions:
      contents: read
      id-token: write
    runs-on: codebuild-ab2d-${{github.run_id}}-${{github.run_attempt}}
    env:
      APP: ab2d
      ENV: ${{ inputs.environment }}
      BOOTSTRAP_ENV: ${{ contains(fromJSON('["dev", "test"]'), inputs.environment) && 'test' || 'prod' }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159  # v3.9.2
      - uses: cmsgov/cdap/actions/setup-tenv@8343fb96563ce4b74c4dececee9b268f42bd4a40
      - uses: cmsgov/cdap/actions/setup-sops@84a6bcee5b70d63c44f8fec4f9b542cb5ec29a54
      - uses: cmsgov/cdap/actions/setup-yq@328406d6e1d435b4e3da598bcdab22e576c3945e
      - uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
        with:
          role-to-assume: arn:aws:iam::${{ contains(fromJSON('["dev", "test"]'), inputs.environment) && secrets.NON_PROD_ACCOUNT || secrets.PROD_ACCOUNT }}:role/delegatedadmin/developer/ab2d-${{ inputs.environment }}-github-actions
          aws-region: ${{ vars.AWS_REGION }}
      - name: tofu apply - bootstrap
        working-directory: ops/services/00-bootstrap/
        run: |
          tofu init -var=parent_env=$BOOTSTRAP_ENV -reconfigure
          tofu workspace select -var=parent_env=$BOOTSTRAP_ENV -or-create=true $BOOTSTRAP_ENV
          tofu plan -out=tfplan
          tofu apply -input=false tfplan
      - name: tofu apply - config
        working-directory: ops/services/10-config/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          tofu plan -out=tfplan
          tofu apply -input=false tfplan 
      - name: tofu apply - core
        working-directory: ops/services/10-core/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          tofu plan -out=tfplan
          tofu apply -input=false tfplan 
      - name: tofu apply - web
        working-directory: ops/services/15-web/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          tofu plan -out=tfplan
          tofu apply -input=false tfplan 
      - name: tofu apply - contracts
        working-directory: ops/services/20-contracts/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          ACTIVE_TASK_ARN=$(aws ecs list-tasks --cluster ab2d-$ENV-microservices --service ab2d-$ENV-contracts --query 'taskArns[]' --output text)
          ACTIVE_IMAGE_TAG=$(aws ecs describe-tasks --cluster ab2d-$ENV-microservices --tasks $TASK_ARN --query "tasks[].containers[].image" --output text)
          tofu plan ${{ inputs.contracts_image_tag != '' && format('{0}{1}', '-var=contracts_service_image_tag=', inputs.contracts_image_tag) || '-var=contracts_service_image_tag=$ACTIVE_IMAGE_TAG' }} -out=tfplan
          tofu apply -input=false tfplan
      - name: tofu apply - events
        working-directory: ops/services/20-events/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          ACTIVE_TASK_ARN=$(aws ecs list-tasks --cluster ab2d-$ENV-microservices --service ab2d-$ENV-events --query 'taskArns[]' --output text)
          ACTIVE_IMAGE_TAG=$(aws ecs describe-tasks --cluster ab2d-$ENV-microservices --tasks $TASK_ARN --query "tasks[].containers[].image" --output text)
          tofu plan ${{ inputs.events_image_tag != '' && format('{0}{1}', '-var=events_service_image_tag=', inputs.events_image_tag) || '-var=events_service_image_tag=$ACTIVE_IMAGE_TAG' }} -out=tfplan
      - name: tofu apply - api
        working-directory: ops/services/30-api/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          ACTIVE_TASK_ARN=$(aws ecs list-tasks --cluster ab2d-$ENV-api --service ab2d-$ENV-api --query 'taskArns[]' --output text)
          ACTIVE_IMAGE_TAG=$(aws ecs describe-tasks --cluster ab2d-$ENV-api --tasks $TASK_ARN --query "tasks[].containers[].image" --output text)
          tofu plan ${{ inputs.api_image_tag != '' && format('{0}{1}', '-var=api_service_image_tag=', inputs.api_image_tag) || '-var=api_service_image_tag=$ACTIVE_IMAGE_TAG' }} -out=tfplan
          tofu apply -input=false tfplan
      - name: tofu plan - idr-db-importer
        working-directory: ops/services/30-idr-db-importer/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          ACTIVE_TASK_ARN=$(aws ecs list-tasks --cluster ab2d-$ENV --service ab2d-$ENV-idr-db-importer --query 'taskArns[]' --output text)
          ACTIVE_IMAGE_TAG=$(aws ecs describe-tasks --cluster ab2d-$ENV --tasks $TASK_ARN --query "tasks[].containers[].image" --output text)
          tofu plan ${{ inputs.idr_db_importer_image_tag != '' && format('{0}{1}', '-var=image_tag=', inputs.idr_db_importer_image_tag) || '-var=image_tag=$ACTIVE_IMAGE_TAG' }} -out=tfplan
          tofu apply -input=false tfplan
      - name: tofu apply - lambda
        working-directory: ops/services/30-lambda/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          tofu plan -out=tfplan
          tofu apply -input=false tfplan 
      - name: tofu apply - worker
        working-directory: ops/services/30-worker/
        run: |
          tofu init -var=parent_env=$ENV -reconfigure
          tofu workspace select -var=parent_env=$ENV -or-create=true $ENV
          ACTIVE_TASK_ARN=$(aws ecs list-tasks --cluster ab2d-$ENV-worker --service ab2d-$ENV-worker --query 'taskArns[]' --output text)
          ACTIVE_IMAGE_TAG=$(aws ecs describe-tasks --cluster ab2d-$ENV-worker --tasks $TASK_ARN --query "tasks[].containers[].image" --output text)
          tofu plan ${{ inputs.worker_image_tag != '' && format('{0}{1}', '-var=worker_service_image_tag=', inputs.worker_image_tag) || '-var=worker_service_image_tag=$ACTIVE_IMAGE_TAG' }} -out=tfplan
          tofu apply -input=false tfplan 
