name: Contracts SonarQube

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
defaults:
  run:
    working-directory: ./contracts

env:
  SONAR_PROJECT_KEY: ab2d-contracts

jobs:
  sonarqube:
    runs-on: codebuild-ab2d-non-prod-${{github.run_id}}-${{github.run_attempt}}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.3.0

      - uses: actions/setup-java@v4 #TODO: Update to Node24
        with:
          distribution: 'adopt'
          java-version: '17'

      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.NON_PROD_ACCOUNT }}:role/delegatedadmin/developer/ab2d-test-github-actions

      - uses: cmsgov/cdap/actions/aws-params-env-action@main
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        with:
          params: |
            ARTIFACTORY_URL=/artifactory/url
            ARTIFACTORY_USER=/artifactory/user
            ARTIFACTORY_PASSWORD=/artifactory/password
            SONAR_HOST_URL=/sonarqube/url
            SONAR_TOKEN=/sonarqube/token
            HPMS_AUTH_KEY_ID=/ab2d/dev/core/sensitive/hpms_auth_key_id
            HPMS_AUTH_KEY_SECRET=/ab2d/dev/core/sensitive/hpms_auth_key_secret

      - name: Run tests
        run: ./gradlew clean test --info

      - name: SonarQube Analysis
        run: |
          ./gradlew sonar \
            -Dsonar.ci.autoconfig.disabled=true \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN

      - name: Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        continue-on-error: true
        with:
          scanMetadataReportFile: contracts/build/sonar/report-task.txt
        timeout-minutes: 10
