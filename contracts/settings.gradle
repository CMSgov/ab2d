
pluginManagement {
    repositories {
        def artifactoryUrl = System.getenv().get("ARTIFACTORY_URL") ?: System.getProperty('artifactory_contextUrl')
        if (artifactoryUrl) {
            maven {
                url = "${artifactoryUrl}/ab2d-main"
                credentials {
                    username = "${System.getenv().get("ARTIFACTORY_USER") ?: (System.getProperty('artifactory_user'))}"
                    password = "${System.getenv().get("ARTIFACTORY_PASSWORD") ?: (System.getProperty('artifactory_password'))}"
                }
            }
        }

        gradlePluginPortal()
    }
}

rootProject.name = 'ab2d-contracts'



