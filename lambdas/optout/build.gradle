plugins {
    id 'java'
}

version "$optoutVersion"

repositories {
    mavenCentral()
    mavenLocal()
}


dependencies {
    implementation 'com.amazonaws:aws-lambda-java-core:1.2.2'
    implementation 'com.amazonaws:aws-lambda-java-events:3.11.0'
    implementation 'com.amazonaws:aws-java-sdk-s3:1.12.793'
    implementation 'org.postgresql:postgresql:42.7.11'
    implementation 'software.amazon.awssdk:s3:2.33.13'
    implementation 'software.amazon.awssdk:sts:2.33.13'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.20.0'
    implementation(project(":lambda-lib"))
    testImplementation 'com.amazonaws:aws-java-sdk-sqs:1.12.793'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.1'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.1'
    testImplementation 'org.mockito:mockito-core:5.23.0'
    testImplementation 'org.testcontainers:junit-jupiter:1.20.6'
    testImplementation 'org.testcontainers:postgresql:1.20.6'
    testImplementation project(':lambda-test-utils')
    testImplementation 'org.liquibase:liquibase-core:4.33.0'
    testImplementation 'io.findify:s3mock_2.13:0.2.6'
    testImplementation "uk.org.webcompere:system-stubs-jupiter:2.1.3"
}

task buildZip(type: Zip) {

    from compileJava
    from processResources
    into('lib') {
        from configurations.runtimeClasspath
    }
    archiveFileName = 'optout.zip'
}

ext.set("zipName", 'optout')

test {
    useJUnitPlatform()
}

sonarqube {
    properties {
        property 'sonar.coverage.exclusions', "**/OptOutConstants.java"
    }
}

task wrapper(type: Wrapper) {
    gradleVersion = '9.2.0'
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

build.dependsOn buildZip
