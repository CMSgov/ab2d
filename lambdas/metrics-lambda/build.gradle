plugins {
    id 'java'
    id 'java-library'
}

version "$metricsVersion"

configurations.configureEach {
    exclude group: 'org.mock-server'
    exclude group: 'io.netty'
    exclude group: 'software.amazon.awssdk', module: 'netty-nio-client'
    exclude group: 'org.springframework'
    exclude group: 'org.springframework.boot'
    exclude group: 'org.springframework.cloud'
    exclude group: 'com.slack.api'
    exclude group: 'org.jetbrains.kotlin'
    exclude group: 'org.postgresql'
    exclude group: 'com.squareup.okhttp3'
    exclude group: 'commons-codec'
    exclude group: 'com.squareup.okio'
    exclude group: 'org.testcontainers'
}

repositories {
    mavenCentral()
    mavenLocal()
}

dependencies {
    implementation 'gov.cms.ab2d:ab2d-events-client:1.11.2'

    implementation 'com.amazonaws:aws-lambda-java-core:1.2.2'
    implementation 'com.amazonaws:aws-lambda-java-events:3.11.0'
    implementation 'com.amazonaws:aws-java-sdk-sqs:1.12.793'

    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-joda:2.15.0'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.15.0'

    annotationProcessor 'org.projectlombok:lombok:1.18.42'
    compileOnly 'org.projectlombok:lombok:1.18.42'

    implementation 'org.slf4j:slf4j-api:2.0.4'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.1'
    testImplementation 'org.junit.platform:junit-platform-commons:1.9.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.1'
    testImplementation 'org.mockito:mockito-core:5.23.0'
    testImplementation project(':lambda-test-utils')
}

test {
    useJUnitPlatform()
}

tasks.register('buildZip', Zip) {
    from compileJava
    from processResources
    into('lib') {
        from configurations.runtimeClasspath
    }
    archiveFileName = 'metrics-lambda.zip'
}

tasks.register('wrapper', Wrapper) {
    gradleVersion = '9.2.0'
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

build.dependsOn buildZip